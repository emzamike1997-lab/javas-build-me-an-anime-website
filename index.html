<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }
        .header {
            background-color: #333;
            color: #fff;
            padding: 20px;
            text-align: center;
        }
        .header h1 {
            margin: 0;
        }
        .nav {
            background-color: #444;
            padding: 10px;
            text-align: center;
        }
        .nav a {
            color: #fff;
            text-decoration: none;
            margin: 10px;
        }
        .nav a:hover {
            color: #ccc;
        }
        .main {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }
        .anime-card {
            background-color: #fff;
            margin: 10px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: calc(33.33% - 20px);
        }
        .anime-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px 10px 0 0;
        }
        .anime-card h2 {
            margin: 0;
            padding: 10px;
        }
        .anime-card p {
            padding: 10px;
        }
        .footer {
            background-color: #333;
            color: #fff;
            padding: 10px;
            text-align: center;
            clear: both;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Anime Website</h1>
    </div>
    <div class="nav">
        <a href="#">Home</a>
        <a href="#">Anime List</a>
        <a href="#">Watch Online</a>
    </div>
    <div class="main">
        <div class="anime-card">
            <img src="https://via.placeholder.com/300" alt="Anime 1">
            <h2>Anime 1</h2>
            <p>This is a description of Anime 1.</p>
        </div>
        <div class="anime-card">
            <img src="https://via.placeholder.com/300" alt="Anime 2">
            <h2>Anime 2</h2>
            <p>This is a description of Anime 2.</p>
        </div>
        <div class="anime-card">
            <img src="https://via.placeholder.com/300" alt="Anime 3">
            <h2>Anime 3</h2>
            <p>This is a description of Anime 3.</p>
        </div>
    </div>
    <div class="footer">
        <p>&copy; 2024 Anime Website</p>
    </div>
    <script>
        // Add event listener to nav links
        document.querySelectorAll('.nav a').forEach(link => {
            link.addEventListener('click', event => {
                event.preventDefault();
                // Add functionality here
            });
        });
    </script>
</body>
</html>
